<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen bg-base-200">
    <nav class="navbar bg-base-100 shadow-md px-4 md:px-8 sticky top-0 z-50">
        <div class="flex-1 gap-2">
            <img src="assets/github-logo.png" alt="Logo" class="w-8 h-8">
            <a class="text-xl font-bold hidden sm:inline-block">GitHub Issues Tracker</a>
        </div>
        <div class="flex-none gap-2">
            <div class="flex gap-2 items-center">
                <input type="text" id="searchInput" placeholder="Search issues…"
                    class="input input-bordered input-sm w-40 md:w-64" />
                <button id="searchBtn" class="btn btn-sm btn-neutral">Search</button>
                <button class="btn btn-sm btn-primary">+ New Issue</button>
            </div>
        </div>
    </nav>
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 gap-3">
            <div class="tabs tabs-boxed bg-base-100">
                <a class="tab tab-active" data-tab="all">All</a>
                <a class="tab" data-tab="open">Open</a>
                <a class="tab" data-tab="closed">Closed</a>
            </div>
        </div>
        <div class="flex items-center justify-between bg-base-100 rounded-xl px-6 py-5 mb-6 shadow-sm border">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-100 rounded-full p-3">
                    <img src="assets/Aperture.png" alt="Issues" class="w-8 h-8">
                </div>
                <div>
                    <h2 id="issueCount" class="text-2xl font-bold text-gray-800">50 Issues</h2>
                    <p class="text-sm text-gray-400">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-5 text-sm">
                <span class="flex items-center gap-2 cursor-pointer hover:underline" id="openMarker">
                    <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
                    <span id="openCount" class="font-semibold">Open</span>
                </span>
                <span class="flex items-center gap-2 cursor-pointer hover:underline" id="closedMarker">
                    <span class="w-3 h-3 rounded-full bg-purple-500 inline-block"></span>
                    <span id="closedCount" class="font-semibold">Closed</span>
                </span>
            </div>
        </div>


        <div id="loadingSpinner" class="flex justify-center py-20">
            <span class="loading loading-spinner loading-lg text-neutral"></span>
        </div>

           <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
        </div>
        <div id="noResults" class="text-center py-20 hidden">
            <p class="text-gray-500 text-lg">No issues found.</p>
        </div>
    </div>

    <dialog id="issueModal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <div id="modalContent">
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>
    <script src="/app.js"></script>
 </body>

</html>
