<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen bg-base-200 flex items-center justify-center">

    <div class="card w-full max-w-md bg-base-100 shadow-xl p-8">
        <div class="flex flex-col items-center mb-6">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mb-3">
            <h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div class="form-control">
                <label class="label">
                    <span class="label-text font-semibold">Username</span>
                </label>
                <input type="text" id="username" placeholder="Enter Username"
                    class="input input-bordered w-full" required />
                <p class="text-sm text-indigo-500 mt-1">Default: admin</p>
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text font-semibold">Password</span>
                </label>
                <input type="password" id="password" placeholder="Enter Password"
                    class="input input-bordered w-full" required />
                <p class="text-sm text-indigo-500 mt-1">Default: admin123</p>
            </div>

            <div id="errorMsg" class="text-error text-sm hidden">Invalid username or password!</div>

            <button type="submit" class="btn btn-primary w-full mt-2">Sign In</button>
        </form>
        <div class="divider text-xs text-gray-400">OR</div>
        <p class="text-center text-sm text-gray-400 mb-2">Demo Credentials:</p>
        <div class="bg-base-200 rounded-lg p-3 text-sm text-center">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
    </div>

</body>

</html>
